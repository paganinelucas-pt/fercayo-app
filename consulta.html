<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fercayo · Consulta</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/checklist.css">
  <link rel="stylesheet" href="css/auth.css">
  <link rel="stylesheet" href="css/consulta.css">
</head>
<body>

  <!-- ── LOGIN OVERLAY ──────────────────────────────────────────── -->
  <div id="login-overlay" style="display:flex">
    <div class="login-box">
      <div class="login-logo">
        <div class="logo-text">FERCAYO</div>
        <div class="logo-sub">CARPINTARIAS</div>
      </div>
      <div class="login-title">Acesso à Aplicação</div>
      <div class="login-field">
        <div class="mlabel">Email</div>
        <input class="minp" id="login-email" type="email" placeholder="email@fercayo.pt"
          onkeydown="if(event.key==='Enter')document.getElementById('login-pass').focus()">
      </div>
      <div class="login-field">
        <div class="mlabel">Password</div>
        <input class="minp" id="login-pass" type="password" placeholder="••••••••"
          onkeydown="if(event.key==='Enter')fazerLogin()">
      </div>
      <div id="login-err" class="login-err"></div>
      <button class="btn btn-gold" id="login-btn" onclick="fazerLogin()" style="width:100%;justify-content:center">Entrar</button>
    </div>
  </div>

  <div id="app-root" style="display:none">

  <!-- ── TOPBAR ──────────────────────────────────────── -->
  <div id="topbar">
    <div class="logo">
      <div>
        <div class="logo-text">FERCAYO</div>
        <div class="logo-sub">CARPINTARIAS</div>
      </div>
    </div>

    <div class="topbar-sep"></div>
    <div id="breadcrumb"><span id="bc-obra">Consulta</span></div>

    <div id="obra-tabs" style="display:none">
      <a class="obra-tab" href="checklist.html">A · Reunião</a>
      <a class="obra-tab" href="levantamento.html">B · Levantamento</a>
      <span class="obra-tab active">C · Consulta</span>
    </div>

    <div class="topbar-actions">
      <button class="btn btn-gold btn-sm" onclick="exportarResumoPreparador()" id="btn-resumo-pdf" style="display:none">🖨 Resumo PDF</button>
    </div>

    <div class="user-info">
      <span id="user-badge" class="user-badge">—</span>
      <span id="user-email"></span>
      <button class="btn btn-out btn-sm" onclick="fazerLogout()">Sair</button>
    </div>

  </div>

  <!-- ── LAYOUT ──────────────────────────────────────── -->
  <div id="layout">
    <div id="main">

      <!-- col itens -->
      <div id="col-itens">

        <!-- Pesquisa de obra -->
        <div class="col-hdr">
          <div class="obra-search-wrap" style="flex:1">
            <input class="obra-search-inp" id="cons-search"
              placeholder="Seleccionar obra…"
              oninput="filtrarDropdownObra()" onfocus="abrirDropdownConsulta()"
              autocomplete="off">
            <div class="obra-dropdown" id="cons-drop"></div>
          </div>
        </div>

        <!-- Tag da obra seleccionada -->
        <div id="obra-tag-cons" style="display:none;padding:6px 10px;border-bottom:1px solid var(--border)"></div>

        <!-- Filtros de estado -->
        <div id="estado-filtros">
          <button class="filtro-chip active" data-estado="" onclick="setFiltroEstado('')">Todos</button>
          <button class="filtro-chip" data-estado="pendente"  onclick="setFiltroEstado('pendente')">○ Pend.</button>
          <button class="filtro-chip" data-estado="conferido" onclick="setFiltroEstado('conferido')">✔ Conf.</button>
          <button class="filtro-chip" data-estado="alteracao" onclick="setFiltroEstado('alteracao')">⚠ Alt.</button>
          <button class="filtro-chip" data-estado="extra"     onclick="setFiltroEstado('extra')">＋ Extra</button>
          <button class="filtro-chip" data-estado="anulado"   onclick="setFiltroEstado('anulado')">✕ Anul.</button>
        </div>

        <!-- Filtrar itens -->
        <input type="text" id="search-itens" placeholder="Filtrar itens…"
          oninput="filtrarItens(this.value)">

        <!-- Lista de itens -->
        <div id="lista-itens">
          <div class="empty-state">
            <div style="font-size:28px;opacity:.3">📋</div>
            Selecciona uma obra
          </div>
        </div>

      </div>

      <!-- col detalhe (só leitura) -->
      <div id="col-detalhe">
        <div id="detalhe-cons">
          <div class="empty-state" style="height:160px">
            <div style="font-size:28px;opacity:.3">📋</div>
            Selecciona um item para ver o detalhe
          </div>
        </div>
      </div>

    </div>
  </div>

  <div id="toast"></div>

  </div><!-- /app-root -->

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
  <!-- Shared -->
  <script src="js/shared/db.js"></script>
  <script src="js/shared/auth.js"></script>
  <!-- Consulta modules -->
  <script src="js/consulta/state.js"></script>
  <script src="js/consulta/db-init.js"></script>
  <script src="js/consulta/obras.js"></script>
  <script src="js/consulta/itens.js"></script>
  <script src="js/consulta/pdf-cons.js"></script>
  <script src="js/consulta/app.js"></script>

</body>
</html>
